<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DSA Mastery Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
:root[data-theme="dark"] {
  --bg-primary: #0d0f14;
  --bg-secondary: #141720;
  --bg-card: #1a1d27;
  --bg-hover: #20242f;
  --border: #2a2e3d;
  --border-active: #3d82f6;
  --text-primary: #f0f2f8;
  --text-secondary: #8890a8;
  --text-muted: #555d73;
  --accent: #4f8ef7;
  --accent-glow: rgba(79,142,247,0.15);
  --accent2: #7c5cbf;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.1);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.1);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.1);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.1);
  --sidebar-w: 260px;
  --topbar-h: 60px;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
}
:root[data-theme="light"] {
  --bg-primary: #f4f6fc;
  --bg-secondary: #ffffff;
  --bg-card: #ffffff;
  --bg-hover: #f0f3fc;
  --border: #e2e8f0;
  --border-active: #3d82f6;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.1);
  --accent2: #7c3aed;
  --green: #16a34a;
  --green-bg: rgba(22,163,74,0.1);
  --yellow: #d97706;
  --yellow-bg: rgba(217,119,6,0.1);
  --red: #dc2626;
  --red-bg: rgba(220,38,38,0.1);
  --purple: #7c3aed;
  --purple-bg: rgba(124,58,237,0.1);
  --sidebar-w: 260px;
  --topbar-h: 60px;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Space Grotesk',sans-serif;background:var(--bg-primary);color:var(--text-primary);font-size:14px;line-height:1.6;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted);}

.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:transform .3s ease;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--topbar-h);background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;flex-shrink:0;}
.content-area{flex:1;overflow-y:auto;padding:28px 32px;}

.sidebar-header{padding:18px 16px 12px;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.logo-text{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.2;color:var(--text-primary);}
.logo-sub{font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}
.sidebar-nav{padding:10px 8px;flex:1;overflow-y:auto;}
.nav-section-label{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;padding:8px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:all .15s;margin-bottom:2px;position:relative;}
.nav-item:hover{background:var(--bg-hover);}
.nav-item.active{background:var(--accent-glow);color:var(--accent);}
.nav-item.active .nav-icon{color:var(--accent);}
.nav-icon{width:18px;text-align:center;font-size:14px;color:var(--text-muted);}
.nav-label{flex:1;font-size:13px;font-weight:500;}
.nav-badge{font-size:10px;background:var(--bg-hover);color:var(--text-muted);padding:1px 7px;border-radius:99px;font-family:'JetBrains Mono',monospace;}
.nav-item.active .nav-badge{background:var(--accent-glow);color:var(--accent);}
.week-progress-mini{height:3px;background:var(--border);border-radius:99px;margin:0 10px 2px;overflow:hidden;}
.week-progress-mini-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;}

.topbar-left{display:flex;align-items:center;gap:10px;flex:1;}
.hamburger{display:none;cursor:pointer;color:var(--text-secondary);font-size:18px;padding:4px;}
.page-title{font-size:16px;font-weight:600;color:var(--text-primary);}
.breadcrumb{font-size:12px;color:var(--text-muted);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:99px;padding:6px 14px;transition:border .2s;}
.search-bar:focus-within{border-color:var(--accent);}
.search-bar input{background:transparent;border:none;outline:none;color:var(--text-primary);font-size:13px;width:180px;font-family:'Space Grotesk',sans-serif;}
.search-bar input::placeholder{color:var(--text-muted);}
.search-icon{color:var(--text-muted);font-size:13px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:'Space Grotesk',sans-serif;transition:all .15s;}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text-primary);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.btn-sm{padding:5px 11px;font-size:12px;}

.filter-bar{display:flex;align-items:center;gap:8px;padding:0 0 20px;flex-wrap:wrap;}
.filter-chip{padding:5px 13px;border-radius:99px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;}
.filter-chip:hover{border-color:var(--accent);color:var(--accent);}
.filter-chip.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent);}

.week-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:22px;padding:20px 24px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);}
.week-badge{width:54px;height:54px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.week-badge-num{font-size:18px;font-weight:700;color:#fff;line-height:1;}
.week-badge-label{font-size:9px;color:rgba(255,255,255,.7);letter-spacing:.1em;}
.week-info{flex:1;}
.week-title{font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:4px;}
.week-desc{font-size:13px;color:var(--text-secondary);margin-bottom:10px;}
.week-stats{display:flex;gap:16px;flex-wrap:wrap;}
.week-stat{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);}
.week-stat strong{color:var(--text-primary);}
.week-progress-wrap{display:flex;align-items:center;gap:10px;min-width:140px;}
.week-progress-bar{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
.week-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s ease;}
.week-pct{font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap;font-family:'JetBrains Mono',monospace;}

.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:32px;}
.topic-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer;}
.topic-card:hover{border-color:var(--border-active);box-shadow:0 0 0 1px var(--accent-glow),var(--shadow);}
.topic-card.completed{border-left:3px solid var(--green);}
.topic-card.bookmarked{border-left:3px solid var(--yellow);}
.topic-header{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;}
.topic-checkbox{width:20px;height:20px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.topic-checkbox.checked{background:var(--green);border-color:var(--green);}
.topic-checkbox.checked::after{content:'✓';font-size:11px;color:#fff;font-weight:700;}
.topic-title{flex:1;font-size:13.5px;font-weight:600;color:var(--text-primary);}
.diff-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.diff-easy{background:var(--green-bg);color:var(--green);}
.diff-medium{background:var(--yellow-bg);color:var(--yellow);}
.diff-hard{background:var(--red-bg);color:var(--red);}
.topic-patterns{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:5px;}
.pattern-tag{font-size:10px;padding:2px 7px;border-radius:5px;background:var(--bg-hover);color:var(--text-muted);font-family:'JetBrains Mono',monospace;border:1px solid var(--border);}
.topic-actions{display:flex;align-items:center;gap:6px;padding:10px 14px 12px;border-top:1px solid var(--border);}
.btn-practice{flex:1;padding:6px 0;background:var(--accent-glow);color:var(--accent);border:1px solid rgba(79,142,247,.25);border-radius:7px;cursor:pointer;font-size:11.5px;font-weight:600;font-family:'Space Grotesk',sans-serif;transition:all .15s;}
.btn-practice:hover{background:var(--accent);color:#fff;}
.btn-notes{padding:6px 10px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:11px;font-family:'Space Grotesk',sans-serif;transition:all .15s;}
.btn-notes:hover{border-color:var(--accent);color:var(--accent);}
.btn-bookmark{padding:6px 9px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:13px;transition:all .15s;}
.btn-bookmark:hover{border-color:var(--yellow);color:var(--yellow);}
.btn-bookmark.active{background:var(--yellow-bg);border-color:var(--yellow);color:var(--yellow);}
.confidence-dots{display:flex;gap:3px;padding:0 14px 10px;}
.conf-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .15s;}
.conf-dot.filled{background:var(--accent);}
.conf-label{font-size:10px;color:var(--text-muted);margin-left:4px;align-self:center;}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:4px;}
.stat-icon{font-size:20px;margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.stat-value{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text-primary);line-height:1;}
.stat-sub{font-size:11px;color:var(--text-muted);}
.stat-sub.up{color:var(--green);}

.chart-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;}
.chart-title{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-fill{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent2));transition:height .5s ease;min-height:4px;}
.bar-label{font-size:9px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;}

.journal-wrap{max-width:820px;}
.journal-entry{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;}
.journal-entry-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.journal-date{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);}
.journal-topic{font-size:14px;font-weight:600;color:var(--text-primary);}
.journal-tag{font-size:10px;padding:2px 7px;border-radius:5px;background:var(--accent-glow);color:var(--accent);border:1px solid rgba(79,142,247,.2);}
.journal-field{margin-bottom:10px;}
.journal-field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);display:block;margin-bottom:4px;}
.journal-field p{font-size:13px;color:var(--text-secondary);line-height:1.5;}
.journal-mistake{color:var(--red);font-size:13px;}
.conf-stars{display:flex;gap:3px;}
.conf-star{font-size:14px;color:var(--border);}
.conf-star.lit{color:var(--yellow);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px);}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:28px;width:min(520px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.5);transform:translateY(20px);transition:transform .25s;max-height:90vh;overflow-y:auto;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:transparent;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;color:var(--text-muted);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal-close:hover{background:var(--bg-hover);color:var(--text-primary);}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.05em;}
.form-input,.form-textarea{width:100%;background:var(--bg-primary);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text-primary);font-family:'Space Grotesk',sans-serif;font-size:13px;transition:border .2s;outline:none;}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:80px;}
.conf-picker{display:flex;gap:6px;}
.conf-pick-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-muted);font-family:'JetBrains Mono',monospace;transition:all .15s;}
.conf-pick-btn:hover,.conf-pick-btn.sel{background:var(--accent-glow);border-color:var(--accent);color:var(--accent);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

.section-title{font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty-state .icon{font-size:40px;margin-bottom:10px;}
.empty-state p{font-size:14px;}

.theme-toggle{width:38px;height:22px;background:var(--border);border-radius:99px;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;border:none;}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .3s;}
[data-theme="light"] .theme-toggle{background:var(--accent);}
[data-theme="light"] .theme-toggle::after{transform:translateX(16px);}

.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:2000;}
.toast{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text-primary);box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;animation:toastIn .25s ease;min-width:220px;}
.toast.success{border-left:3px solid var(--green);}
.toast.info{border-left:3px solid var(--accent);}
.toast.warn{border-left:3px solid var(--yellow);}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

.streak-card{background:linear-gradient(135deg,rgba(239,68,68,.15),rgba(245,158,11,.1));border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:16px;margin-bottom:12px;}
.streak-flame{font-size:32px;}
.streak-info{flex:1;}
.streak-num{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--red);}
.streak-label{font-size:12px;color:var(--text-muted);}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .hamburger{display:flex;}
  .content-area{padding:16px;}
  .week-header{flex-direction:column;}
  .week-progress-wrap{width:100%;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .search-bar input{width:120px;}
}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;}
.sidebar-overlay.open{display:block;}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div>
          <div class="logo-text">DSA Mastery</div>
          <div class="logo-sub">ROADMAP v2.0</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Dashboard</span>
      </div>
      <div class="nav-item" data-page="journal" onclick="navigate('journal')">
        <span class="nav-icon">📓</span>
        <span class="nav-label">Practice Journal</span>
      </div>
      <div class="nav-item" data-page="bookmarks" onclick="navigate('bookmarks')">
        <span class="nav-icon">🔖</span>
        <span class="nav-label">Revise Later</span>
      </div>
      <div class="nav-section-label" style="margin-top:8px;">Weekly Roadmap</div>
      <div id="weekNav"></div>
    </nav>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <span class="hamburger" onclick="toggleSidebar()">☰</span>
        <div>
          <div class="page-title" id="pageTitle">Dashboard</div>
          <div class="breadcrumb" id="breadcrumb">DSA Mastery Roadmap</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search topics..." id="searchInput" oninput="handleSearch(this.value)"/>
        </div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme"></button>
      </div>
    </header>

    <div class="content-area" id="contentArea"></div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Notes</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ─────────────────────────── DATA ───────────────────────────
const ROADMAP = [
  {
    week: 1, title: "Programming Basics",
    desc: "Solidify your foundation with time/space complexity, basic math, and problem decomposition.",
    color: "#4f8ef7",
    topics: [
      {id:"1-1",title:"Big-O Notation & Complexity",diff:"Easy",patterns:["Time Complexity","Space Complexity","Amortized Analysis"]},
      {id:"1-2",title:"Bit Manipulation Basics",diff:"Easy",patterns:["XOR Tricks","Bit Shifts","AND/OR/NOT"]},
      {id:"1-3",title:"Math for DSA (Modulo, GCD)",diff:"Easy",patterns:["Euclid's Algorithm","Prime Sieve","Modular Arithmetic"]},
      {id:"1-4",title:"Arrays & Basic Traversal",diff:"Easy",patterns:["Linear Scan","Two Pointer","Index Tricks"]},
      {id:"1-5",title:"Hashing Fundamentals",diff:"Easy",patterns:["HashMap","HashSet","Frequency Count"]},
    ]
  },
  {
    week: 2, title: "Arrays & Math",
    desc: "Master array manipulation patterns used in 40%+ of coding interviews.",

// ─────────────────────────── STREAK HELPERS ───────────────────────────
// Returns local date as YYYY-MM-DD string (no timezone bugs)
function getLocalDateStr(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// Returns difference in calendar days between two YYYY-MM-DD strings
function daysBetween(dateStrA, dateStrB) {
  const msPerDay = 1000 * 60 * 60 * 24;
  const a = new Date(dateStrA + 'T00:00:00');
  const b = new Date(dateStrB + 'T00:00:00');
  return Math.round((b - a) / msPerDay);
}

// ─────────────────────────── STREAK CORE ───────────────────────────
// Call this whenever the user completes any activity.
// Returns the updated streak value and persists it.
function recordActivity() {
  const today = getLocalDateStr();
  const lastActive = localStorage.getItem('lastActiveDate');   // YYYY-MM-DD or null
  let streak = parseInt(localStorage.getItem('currentStreak') || '0', 10);

  if (!lastActive) {
    // First-time user — initialize at 1
    streak = 1;
  } else {
    const diff = daysBetween(lastActive, today);

    if (diff === 0) {
      // Same day: do NOT change streak (already counted)
      // Just return current value without saving again
      return streak;
    } else if (diff === 1) {
      // Yesterday → extend the streak
      streak += 1;
    } else {
      // Missed a day or more → reset to 1
      streak = 1;
    }
  }

  localStorage.setItem('lastActiveDate', today);
  localStorage.setItem('currentStreak', String(streak));
  return streak;
}

// Load streak on app start (handles missed-day reset on reload)
function loadStreak() {
  const today = getLocalDateStr();
  const lastActive = localStorage.getItem('lastActiveDate');
  let streak = parseInt(localStorage.getItem('currentStreak') || '0', 10);

  if (!lastActive) {
    // Brand new user — no streak yet; show 0 until first activity
    return 0;
  }

  const diff = daysBetween(lastActive, today);

  if (diff > 1) {
    // Missed at least one day — reset streak
    streak = 0;
    localStorage.setItem('currentStreak', '0');
    // Keep lastActiveDate so we don't re-trigger on next reload
  }

  return streak;
}

let state = {
  completed: {},
  bookmarks: {},
  notes: {},
  journal: [],
};

function loadState() {
  try {
    const s = localStorage.getItem('dsaMastery_v2');
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('dsaMastery_v2', JSON.stringify(state));
}

let currentPage = 'dashboard';
let currentWeek = null;
let searchQuery = '';
let filterDiff = 'all';

function navigate(page, weekNum) {
  currentPage = page;
  currentWeek = weekNum || null;
  closeSidebar();
  renderPage();
  updateNavHighlight();
}
function updateNavHighlight() {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.remove('active');
    if (el.dataset.page === currentPage && !el.dataset.week) el.classList.add('active');
    if (currentPage === 'week' && el.dataset.week == currentWeek) el.classList.add('active');
  });
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function renderPage() {
  const area = document.getElementById('contentArea');
  const title = document.getElementById('pageTitle');
  const bc = document.getElementById('breadcrumb');
  if (currentPage === 'dashboard') {
    title.textContent = 'Dashboard'; bc.textContent = 'Overview';
    area.innerHTML = renderDashboard();
    initCharts();
  } else if (currentPage === 'week') {
    const w = ROADMAP.find(x => x.week === currentWeek);
    title.textContent = `Week ${w.week}`; bc.textContent = w.title;
    area.innerHTML = renderWeekPage(w);
  } else if (currentPage === 'journal') {
    title.textContent = 'Practice Journal'; bc.textContent = 'All Notes & Reflections';
    area.innerHTML = renderJournal();
  } else if (currentPage === 'bookmarks') {
    title.textContent = 'Revise Later'; bc.textContent = 'Bookmarked Topics';
    area.innerHTML = renderBookmarks();
  } else if (currentPage === 'search') {
    title.textContent = 'Search Results'; bc.textContent = `"${searchQuery}"`;
    area.innerHTML = renderSearch();
  }
}

  const isComplete = !!state.completed[t.id];
  const isBm = !!state.bookmarks[t.id];
  const note = state.notes[t.id];
  const conf = note?.confidence || 0;
  let cls = '';
  if (isComplete) cls = 'completed';
  else if (isBm) cls = 'bookmarked';

  return `<div class="topic-card ${cls}" id="card-${t.id}">
    <div class="topic-header">
      <div class="topic-checkbox ${isComplete?'checked':''}" onclick="toggleComplete('${t.id}')" title="Mark complete"></div>
      <div class="topic-title">${t.title}</div>
      <span class="diff-badge diff-${t.diff.toLowerCase()}">${t.diff}</span>
    </div>
    <div class="topic-patterns">${t.patterns.map(p => `<span class="pattern-tag">${p}</span>`).join('')}</div>
    ${note?.notes ? `<div style="padding:0 14px 8px;font-size:12px;color:var(--text-muted);border-left:2px solid var(--accent);margin:0 14px 6px;padding-left:10px;">${note.notes.slice(0,80)}${note.notes.length>80?'…':''}</div>` : ''}
    <div class="confidence-dots" title="Confidence Level">
      ${[1,2,3,4,5].map(i => `<div class="conf-dot ${i<=conf?'filled':''}" onclick="quickConf('${t.id}',${i})"></div>`).join('')}
      <span class="conf-label">Confidence</span>
    </div>
    <div class="topic-actions">
      <button class="btn-practice" onclick="practiceClick('${t.id}')">⚡ Practice</button>
      <button class="btn-notes" onclick="openNotesModal('${t.id}','${t.title.replace(/'/g,"\\'")}')">📝 Notes</button>

      const t = w?.topics.find(t => t.id === e.topicId);
      return `<div class="journal-entry">
        <div class="journal-entry-header">
          <div style="flex:1;">
            <div class="journal-topic">${t?.title || e.topicId}</div>
            <div style="display:flex;gap:8px;margin-top:4px;align-items:center;">
              ${w ? `<span class="journal-tag">Week ${w.week}: ${w.title}</span>` : ''}
              <span class="journal-date">${new Date(e.date).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>
            </div>
          </div>
          <div class="conf-stars">${[1,2,3,4,5].map(i => `<span class="conf-star ${i<=(e.confidence||0)?'lit':''}">★</span>`).join('')}</div>
        </div>
        ${e.notes ? `<div class="journal-field"><label>📝 Notes</label><p>${e.notes}</p></div>` : ''}
        ${e.mistakes ? `<div class="journal-field"><label>⚠️ Mistakes Learned</label><p class="journal-mistake">${e.mistakes}</p></div>` : ''}
      </div>`;
    }).join('')}
  `).join('')}
  </div>`;
}

// ─────────────────────────── BOOKMARKS ───────────────────────────
function renderBookmarks() {
  const bms = [];
  ROADMAP.forEach(w => w.topics.forEach(t => { if (state.bookmarks[t.id]) bms.push({t,w}); }));
  if (!bms.length) {
    return `<div class="empty-state"><div class="icon">🔖</div><p>No bookmarks yet.<br/>Click 🔖 on any topic to save it for later revision.</p></div>`;
  }
  return `<div class="filter-bar">
    ${['all','Easy','Medium','Hard'].map(d => `<div class="filter-chip ${filterDiff===d?'active':''}" onclick="setFilter('${d}')">${d==='all'?'All':d}</div>`).join('')}
  </div>
  <div class="topics-grid">
    ${bms.filter(({t}) => filterDiff==='all' || t.diff===filterDiff).map(({t,w}) => renderTopicCard(t,w)).join('')}
  </div>`;
}

// ─────────────────────────── SEARCH ───────────────────────────
function renderSearch() {
  const q = searchQuery.toLowerCase();
  const results = [];
  ROADMAP.forEach(w => w.topics.forEach(t => {
    if (t.title.toLowerCase().includes(q) || t.patterns.some(p => p.toLowerCase().includes(q)) || w.title.toLowerCase().includes(q)) {
      results.push({t,w});
    }
  }));
  if (!results.length) return `<div class="empty-state"><div class="icon">🔍</div><p>No results for "<strong>${searchQuery}</strong>"</p></div>`;
  return `<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Found ${results.length} result(s) for "<strong style="color:var(--text-primary);">${searchQuery}</strong>"</div>
  <div class="topics-grid">${results.map(({t,w}) => renderTopicCard(t,w)).join('')}</div>`;
}

// ─────────────────────────── ACTIONS ───────────────────────────
function toggleComplete(id) {
  state.completed[id] = !state.completed[id];

  if (state.completed[id]) {
    // Record activity → updates streak correctly (no double-count)
    recordActivity();
    showToast('✅ Topic completed! 🔥 Streak updated', 'success');
  } else {
    showToast('↩️ Marked incomplete', 'info');
  }

  saveState();
  renderPage();
  updateWeekNav();
}

function toggleBookmark(id) {
  state.bookmarks[id] = !state.bookmarks[id];
  saveState();
  showToast(state.bookmarks[id] ? '🔖 Saved for revision' : '🔖 Bookmark removed', 'info');
  renderPage();
}

function quickConf(id, val) {
  if (!state.notes[id]) state.notes[id] = {};
  state.notes[id].confidence = val;
  saveState();
  renderPage();
}

function practiceClick(id) {
  const allTopics = ROADMAP.flatMap(w => w.topics);
  const t = allTopics.find(x => x.id === id);
  window.open(`https://leetcode.com/search/?q=${encodeURIComponent(t.title)}`, '_blank');
}

function setFilter(diff) {
  filterDiff = diff;
  renderPage();
}

function handleSearch(val) {
  searchQuery = val.trim();
  if (searchQuery) {
    currentPage = 'search';
    renderPage();
    updateNavHighlight();
  } else {
    if (currentPage === 'search') navigate('dashboard');
  }
}

// ─────────────────────────── NOTES MODAL ───────────────────────────
let modalTopicId = null;

function openNotesModal(id, titleStr) {
  modalTopicId = id;
  const note = state.notes[id] || {};
  document.getElementById('modalTitle').textContent = `📝 ${titleStr}`;
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group">
      <label class="form-label">Notes / Key Learnings</label>
      <textarea class="form-textarea" id="modalNotes" placeholder="Write what you learned, key insight, approach…">${note.notes||''}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">⚠️ Mistakes & What to Avoid</label>
      <textarea class="form-textarea" id="modalMistakes" placeholder="Common errors, edge cases you missed…">${note.mistakes||''}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Confidence Level (1–5)</label>
      <div class="conf-picker">
        ${[1,2,3,4,5].map(i => `<button class="conf-pick-btn ${(note.confidence||0)>=i?'sel':''}" onclick="selectConf(${i})" id="cpb-${i}">${i}</button>`).join('')}
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNotes()">Save Notes</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function selectConf(val) {
  document.querySelectorAll('.conf-pick-btn').forEach((b, i) => {
    b.classList.toggle('sel', i < val);
  });
}

function saveNotes() {
  const notes = document.getElementById('modalNotes').value.trim();
  const mistakes = document.getElementById('modalMistakes').value.trim();
  const conf = document.querySelectorAll('.conf-pick-btn.sel').length;
  if (!state.notes[modalTopicId]) state.notes[modalTopicId] = {};
  state.notes[modalTopicId] = {notes, mistakes, confidence: conf};
  if (notes || mistakes) {
    const existing = state.journal.find(e => e.topicId === modalTopicId && new Date(e.date).toDateString() === new Date().toDateString());
    if (existing) {
      existing.notes = notes; existing.mistakes = mistakes; existing.confidence = conf;
    } else {
      state.journal.push({date: new Date().toISOString(), topicId: modalTopicId, notes, mistakes, confidence: conf});
    }
  }
  saveState();
  closeModal();
  showToast('📝 Notes saved!', 'success');
  renderPage();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─────────────────────────── SIDEBAR NAV BUILD ───────────────────────────
function buildWeekNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = ROADMAP.map(w => {
    const done = w.topics.filter(t => state.completed[t.id]).length;
    const pct = Math.round(done / w.topics.length * 100);
    return `<div class="nav-item" data-week="${w.week}" data-page="week" onclick="navigate('week',${w.week})">
      <span class="nav-icon" style="color:${w.color};font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700;width:20px;text-align:center;">W${w.week}</span>
      <span class="nav-label" style="font-size:12px;">${w.title}</span>
      <span class="nav-badge">${pct}%</span>
    </div>
    <div class="week-progress-mini"><div class="week-progress-mini-fill" style="width:${pct}%"></div></div>`;
  }).join('');
}

function updateWeekNav() { buildWeekNav(); }

// ─────────────────────────── THEME ───────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('dsaMastery_theme', html.dataset.theme);
}

function loadTheme() {
  const t = localStorage.getItem('dsaMastery_theme');
  if (t) document.documentElement.dataset.theme = t;
}

// ─────────────────────────── TOAST ───────────────────────────
function showToast(msg, type = 'info') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─────────────────────────── INIT ───────────────────────────
loadTheme();
loadState();
buildWeekNav();
navigate('dashboard');
</script>
</body>
</html>
